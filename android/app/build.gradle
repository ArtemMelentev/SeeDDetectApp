plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: "com.chaquo.python"

android {
    namespace "com.seeddetect.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    defaultConfig {
        applicationId "com.seeddetect.app"
        minSdk 29
        targetSdk flutter.targetSdkVersion
        versionCode 1
        versionName "1.0"

        // Chaquopy uses native components: package only required ABIs.
        // Limit to x86_64 for the Windows emulator build path.
        // arm64-v8a can be added later after verifying wheel availability.
        ndk {
            abiFilters "x86_64"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }

    sourceSets {
        main {
            python.srcDir "src/main/python"
            python.srcDir "../../"
        }
    }
}

chaquopy {
    defaultConfig {
        version "3.10"
        buildPython("py", "-3.10")
        pip {
            options "--timeout", "120", "--retries", "20"
            install "numpy==1.26.2"
            install "opencv-python-headless==4.5.1.48"
        }
    }
}

tasks.matching { it.name.startsWith("merge") && it.name.endsWith("PythonSources") }.configureEach {
    doNotTrackState("Chaquopy source merge can hit Windows file-lock races during hashing")
}

flutter {
    source "../.."
}

dependencies {
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
}
