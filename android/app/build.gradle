plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: "com.chaquo.python"

import java.util.Properties

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def hasReleaseSigningConfig = keystorePropertiesFile.exists()

if (hasReleaseSigningConfig) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def releaseTasksRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName.toLowerCase().contains("release")
}

def requiredKeystoreKeys = ["storeFile", "storePassword", "keyAlias", "keyPassword"]
def missingKeystoreKeys = hasReleaseSigningConfig
    ? requiredKeystoreKeys.findAll { key ->
        !keystoreProperties.containsKey(key) || !keystoreProperties[key]?.toString()?.trim()
    }
    : requiredKeystoreKeys

if (releaseTasksRequested && !hasReleaseSigningConfig) {
    throw new GradleException("Release signing is not configured. Create android/key.properties with signing values before running release tasks.")
}

if (releaseTasksRequested && !missingKeystoreKeys.isEmpty()) {
    throw new GradleException("android/key.properties is missing required keys: ${missingKeystoreKeys.join(', ')}")
}

def releaseStoreFilePath = hasReleaseSigningConfig ? keystoreProperties["storeFile"]?.toString() : null

if (releaseTasksRequested && releaseStoreFilePath && !file(releaseStoreFilePath).exists()) {
    throw new GradleException("Release keystore file not found: ${releaseStoreFilePath}")
}

android {
    namespace "com.seeddetect.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion "25.1.8937393"

    buildFeatures {
        // BuildConfig is referenced from Kotlin code (MainActivity).
        // Flutter's Gradle setup can disable BuildConfig generation; force-enable it.
        buildConfig true
    }

    defaultConfig {
        applicationId "com.seeddetect.app"
        minSdk 29
        targetSdk flutter.targetSdkVersion
        versionCode 1
        versionName "1.0"

        // Chaquopy requires ABI filters in defaultConfig.
        // Keep both emulator and phone paths available.
        ndk {
            abiFilters "x86_64", "arm64-v8a"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        if (hasReleaseSigningConfig) {
            release {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile file(releaseStoreFilePath)
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigningConfig) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            shrinkResources false
        }
    }

    sourceSets {
        main {
            python.srcDir "src/main/python"
            python.srcDir "$buildDir/generated/chaquopy/python"
        }
    }
}

chaquopy {
    defaultConfig {
        version "3.10"
        buildPython("py", "-3.10")
        pip {
            options "--timeout", "120", "--retries", "20"
            options "--find-links", "https://chaquo.com/pypi-13.1/numpy/"
            options "--find-links", "https://chaquo.com/pypi-13.1/opencv-python-headless/"
            install "numpy==1.26.2"
            install "opencv-python-headless==4.5.1.48"
        }
    }
}

tasks.register("prepareChaquopyPythonSources", Copy) {
    from("../../segment_seeds_scan.py")
    into("$buildDir/generated/chaquopy/python")
}

tasks.matching { it.name.startsWith("merge") && it.name.endsWith("PythonSources") }.configureEach {
    dependsOn("prepareChaquopyPythonSources")
}

flutter {
    source "../.."
}

dependencies {
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
    implementation "com.tom-roush:pdfbox-android:2.0.27.0"
}
